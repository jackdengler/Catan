name: Deploy to GitHub Pages

# Builds the static client and publishes it to GitHub Pages.
# Enable once in the repo: Settings -> Pages -> Build and deployment -> Source: GitHub Actions.
on:
  push:
    # `main`/`master` for the normal case, plus the current default branch so
    # the Pages environment (which only permits deploys from the default branch)
    # accepts the run. Once `main` is made the default branch, the extra line
    # can be removed.
    branches: [main, master, claude/peaceful-fermat-52fA8]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
